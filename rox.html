<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>ROX TRACKER</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #e0fa3e;
            --accent-hover: #c4dc2b;
            --danger-color: #ff453a;
            --safe-color: #30d158;
            --dim-text: #8e8e93;
            --border-color: #333;
            --blue-accent: #0a84ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .hidden { display: none !important; }

        h1, h2, h3, h4 { margin-top: 0; font-weight: 700; }
        
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background-color: var(--card-bg);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: opacity 0.2s, transform 0.1s;
            appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active { opacity: 0.7; transform: scale(0.98); }

        button.primary {
            background-color: var(--accent-color);
            color: #000;
            border: none;
        }

        button.danger {
            background-color: rgba(255, 69, 58, 0.1);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button.secondary {
            background-color: transparent;
            color: var(--blue-accent);
            border: 1px solid var(--blue-accent);
        }
        
        button.small {
            padding: 8px 12px;
            font-size: 14px;
            margin-bottom: 0;
            width: auto;
        }

        input, select, textarea {
            width: 100%;
            background-color: #000;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            box-sizing: border-box;
            appearance: none;
        }

        textarea { min-height: 100px; resize: vertical; }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--dim-text);
            font-size: 14px;
        }

        /* Main Menu Graphics */
        .menu-btn-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
        }
        .menu-btn-content svg {
            width: 48px;
            height: 48px;
        }
        .menu-btn-text {
            font-size: 18px;
            font-weight: 700;
        }
        .menu-btn-subtext {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.7;
        }

        /* Designer specific styles */
        .designer-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .designer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #000;
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }
        .designer-item.type-run { border-left-color: var(--blue-accent); }
        .designer-item.type-rest { border-left-color: var(--safe-color); }
        
        /* Visually de-emphasize automated transitions */
        .designer-item.type-transition { 
            border-left-color: var(--dim-text); 
            opacity: 0.6; 
            padding: 6px 16px; 
            margin-left: 20px;
        }
        .designer-item.type-transition .designer-item-info strong { font-size: 13px; }

        .designer-item-info strong { display: block; font-size: 16px; margin-bottom: 2px;}
        .designer-item-info span { color: var(--dim-text); font-size: 13px; }

        .designer-actions {
            display: flex;
            gap: 6px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        .form-panel {
            background-color: #000;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        /* Tracker specific styles */
        .tracker-time {
            font-size: 64px;
            font-variant-numeric: tabular-nums;
            text-align: center;
            margin: 20px 0;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .tracker-segment {
            text-align: center;
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .tracker-detail {
            text-align: center;
            color: var(--dim-text);
            margin-bottom: 30px;
        }

        .feedback-toast {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .progress-bar {
            height: 4px;
            background-color: var(--border-color);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="view-menu">
        <h1 style="text-align: center; margin-bottom: 5px; font-size: 32px; letter-spacing: -1px;">ROX PRO</h1>
        <p style="text-align: center; color: var(--dim-text); margin-bottom: 30px;">Select training mode</p>
        
        <button class="primary" style="height: auto; padding: 24px;" onclick="showView('view-designer')">
            <div class="menu-btn-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 4h.01M4 20h4l1.5-3M8 20v-3l3-2 1 5h4M16 20h4l-2-7 3-1.5-2.5-4-3 1-2-3-2 1 1.5 3-2.5 1.5"></path>
                </svg>
                <div class="menu-btn-text">Workout Designer</div>
                <div class="menu-btn-subtext">Build & track dynamic ROX circuits</div>
            </div>
        </button>
        
        <button style="height: auto; padding: 24px;" onclick="showView('view-manual'); setTodayDate()">
            <div class="menu-btn-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <div class="menu-btn-text">Manual Log</div>
                <div class="menu-btn-subtext">Retrospectively log a session</div>
            </div>
        </button>
    </div>

    <!-- WORKOUT DESIGNER VIEW -->
    <div id="view-designer" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Designer</h2>
            <button class="small secondary" onclick="loadStandardRox()">Standard ROX</button>
        </div>

        <div class="card">
            <div id="designer-empty-state" style="text-align: center; color: var(--dim-text); padding: 20px 0;">
                No segments added.<br>Start building your timeline below.
            </div>
            
            <div id="designer-list" class="designer-list">
                <!-- Dynamically populated list goes here -->
            </div>

            <div class="grid-3" style="margin-top: 20px;">
                <button class="small" onclick="openAddForm('run')">+ Run</button>
                <button class="small" onclick="openAddForm('station')">+ Station</button>
                <button class="small" onclick="openAddForm('rest')" style="color: var(--safe-color); border-color: var(--safe-color); background: transparent;">+ Rest</button>
            </div>
        </div>

        <!-- Inline Add/Edit Run Form -->
        <div id="form-add-run" class="form-panel hidden">
            <h4 id="title-add-run">Add Run Segment</h4>
            <div class="grid-2">
                <div>
                    <label>Distance</label>
                    <input type="text" id="des-run-dist" placeholder="e.g. 1km">
                </div>
                <div>
                    <label>Pace / Target</label>
                    <select id="des-run-pace">
                        <!-- Populated dynamically via JS -->
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <button class="primary small" id="btn-submit-run" onclick="submitAddRun()">Add</button>
                <button class="danger small" onclick="closeAddForms()">Cancel</button>
            </div>
        </div>

        <!-- Inline Add/Edit Station Form -->
        <div id="form-add-station" class="form-panel hidden">
            <h4 id="title-add-station">Add Station</h4>
            <label>Station Type</label>
            <select id="des-station-name">
                <option value="Sled Push">Sled Push</option>
                <option value="Sled Pull">Sled Pull</option>
                <option value="Ski Erg">Ski Erg</option>
                <option value="Rowing">Rowing</option>
                <option value="Burpee Broad Jumps">Burpee Broad Jumps</option>
                <option value="Farmers Carry">Farmers Carry</option>
                <option value="Sandbag Lunges">Sandbag Lunges</option>
                <option value="Wall Balls">Wall Balls</option>
                <option value="Custom">-- Custom --</option>
            </select>
            
            <input type="text" id="des-station-custom" class="hidden" placeholder="Enter custom station name">
            
            <label>Details (Weight, Distance, Reps)</label>
            <input type="text" id="des-station-details" placeholder="e.g. 50m @ 155kg">
            
            <div class="grid-2">
                <button class="primary small" id="btn-submit-station" onclick="submitAddStation()">Add</button>
                <button class="danger small" onclick="closeAddForms()">Cancel</button>
            </div>
        </div>

        <!-- Inline Add/Edit Rest Form -->
        <div id="form-add-rest" class="form-panel hidden">
            <h4 id="title-add-rest">Add Rest</h4>
            <label>Duration</label>
            <input type="text" id="des-rest-duration" placeholder="e.g. 90s, 2 mins">
            <div class="grid-2">
                <button class="primary small" id="btn-submit-rest" onclick="submitAddRest()">Add</button>
                <button class="danger small" onclick="closeAddForms()">Cancel</button>
            </div>
        </div>

        <button class="primary" id="btn-start-designer" onclick="startSessionFromDesigner()" style="height: 60px; font-size: 18px;">Start Session</button>
        <button class="danger" onclick="showView('view-menu')">Back to Menu</button>
    </div>

    <!-- ROX TRACKER VIEW -->
    <div id="view-tracker" class="hidden">
        <div class="progress-bar"><div class="progress-fill" id="tracker-progress"></div></div>
        <div class="card">
            <div class="tracker-segment" id="active-segment-name">Ready</div>
            <div class="tracker-detail" id="active-segment-detail">Press start to begin</div>
            
            <div class="tracker-time" id="time-display">00:00</div>
            
            <button class="primary" id="btn-next" style="height: 80px; font-size: 20px;" onclick="nextSegment()">START</button>
            <button class="danger" onclick="endSession()">End Session</button>
        </div>
    </div>

    <!-- SUMMARY VIEW -->
    <div id="view-summary" class="hidden">
        <h2>Session Complete</h2>
        
        <div class="card">
            <label>Reflections (RPE, form, failures)</label>
            <textarea id="notes-area" placeholder="How did it feel?"></textarea>
        </div>

        <div id="summary-stats" class="card" style="font-family: monospace; font-size: 14px; white-space: pre-wrap; max-height: 200px; overflow-y: auto;"></div>

        <div id="copy-feedback" class="feedback-toast hidden"></div>
        
        <button class="primary" onclick="exportData('json')">Save to Google Drive</button>
        <button class="secondary" onclick="exportData('csv')">Copy CSV Backup</button>
        <button class="danger" onclick="resetApp()">Return Home</button>
    </div>

    <!-- MANUAL LOG VIEW -->
    <div id="view-manual" class="hidden">
        <h2>Manual Entry</h2>
        
        <div class="card">
            <label>Session Type</label>
            <select id="manual-type" onchange="toggleManualFields()">
                <option value="gym">Gym / S&C</option>
                <option value="run">Run / Cardio</option>
                <option value="other">Other / Mixed</option>
            </select>

            <label>Date</label>
            <input type="date" id="manual-date">
            
            <label>Reflections</label>
            <textarea id="manual-notes" placeholder="Session details, RPE, formatting..."></textarea>
        </div>

        <div id="manual-run-fields" class="card hidden">
            <div class="grid-2">
                <div>
                    <label>Distance</label>
                    <input type="text" id="man-run-dist" placeholder="e.g. 5km">
                </div>
                <div>
                    <label>Time</label>
                    <input type="text" id="man-run-time" placeholder="e.g. 25:00">
                </div>
            </div>
        </div>

        <div id="manual-gym-fields" class="card">
            <h3 style="margin-bottom: 16px;">Exercises</h3>
            <div id="exercise-container">
                <!-- Exercises will be injected here -->
            </div>
            <button class="secondary" onclick="addExerciseField()">+ Add Exercise</button>
        </div>

        <div id="manual-feedback" class="feedback-toast hidden"></div>

        <button class="primary" onclick="generateManualJSON()">Save to Google Drive</button>
        <button class="danger" onclick="showView('view-menu')">Cancel</button>
    </div>

    <script>
        // --- CONSTANTS ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbyOvMZA83dntvbBkeGzZ_jI8Lq6XKMo9JUGjg0gBs7wETvX1C_rlqca1jptHSsQimU/exec'; 

        const standardRoxTemplate = [
            { name: "Run 1", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Ski Erg" },
            { name: "Ski Erg", type: "exercise", detail: "1000m" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 2", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Sled Push" },
            { name: "Sled Push", type: "exercise", detail: "50m @ 152kg" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 3", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Sled Pull" },
            { name: "Sled Pull", type: "exercise", detail: "50m @ 103kg" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 4", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Burpee Broad Jumps" },
            { name: "Burpee Broad Jumps", type: "exercise", detail: "80m" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 5", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Rowing" },
            { name: "Rowing", type: "exercise", detail: "1000m" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 6", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Farmers Carry" },
            { name: "Farmers Carry", type: "exercise", detail: "200m @ 24kg each" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 7", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Sandbag Lunges" },
            { name: "Sandbag Lunges", type: "exercise", detail: "100m @ 20kg" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 8", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Wall Balls" },
            { name: "Wall Balls", type: "exercise", detail: "100 reps @ 6kg" }
        ];

        // Central State Object
        let state = { 
            status: 'idle', 
            history: [], 
            currentIndex: -1, 
            segmentStartTime: null,
            template: [] 
        };
        
        let timerInterval;
        let isResetting = false;
        let wakeLock = null;
        let manualExerciseCount = 0;
        let editIndex = -1; // Tracks which designer item is currently being edited

        // Populate Pace Dropdown (3:00 to 5:30 in 5s increments)
        function populatePaceDropdown() {
            const select = document.getElementById('des-run-pace');
            select.innerHTML = ''; 
            for (let m = 3; m <= 5; m++) {
                for (let s = 0; s < 60; s += 5) {
                    if (m === 5 && s > 30) continue; 
                    const sec = s.toString().padStart(2, '0');
                    const option = document.createElement('option');
                    option.value = `${m}:${sec}/km`;
                    option.text = `${m}:${sec}/km`;
                    if (m === 5 && s === 0) option.selected = true; 
                    select.appendChild(option);
                }
            }
        }
        populatePaceDropdown();

        // --- WORKOUT DESIGNER LOGIC ---
        document.getElementById('des-station-name').addEventListener('change', function(e) {
            document.getElementById('des-station-custom').classList.toggle('hidden', e.target.value !== 'Custom');
        });

        function loadStandardRox() {
            if(state.template.length > 0) {
                if(!confirm("Overwrite your current design with the standard ROX template?")) return;
            }
            state.template = JSON.parse(JSON.stringify(standardRoxTemplate));
            renderDesignerList();
        }

        function renderDesignerList() {
            const listEl = document.getElementById('designer-list');
            const emptyEl = document.getElementById('designer-empty-state');
            const startBtn = document.getElementById('btn-start-designer');
            
            listEl.innerHTML = '';
            
            if (state.template.length === 0) {
                emptyEl.classList.remove('hidden');
                startBtn.classList.add('hidden');
                return;
            }
            
            emptyEl.classList.add('hidden');
            startBtn.classList.remove('hidden');

            state.template.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `designer-item type-${item.type}`;
                
                // Construct the Edit and Remove buttons. Automated transitions don't get edit buttons.
                const actionButtons = `
                    <div class="designer-actions">
                        ${item.type !== 'transition' ? `
                        <button class="secondary small" style="padding: 8px; margin: 0; background: transparent; border: 1px solid var(--dim-text); color: var(--dim-text);" onclick="openEditForm(${index})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        ` : ''}
                        <button class="danger small" style="padding: 8px; margin: 0; border: none; background: rgba(255, 69, 58, 0.1);" onclick="removeDesignerSegment(${index})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                `;

                div.innerHTML = `
                    <div class="designer-item-info">
                        <strong>${item.name}</strong>
                        <span>${item.detail}</span>
                    </div>
                    ${actionButtons}
                `;
                listEl.appendChild(div);
            });
        }

        function removeDesignerSegment(index) {
            state.template.splice(index, 1);
            renderDesignerList();
        }

        // Opens form fresh for a new item
        function openAddForm(type) {
            closeAddForms();
            editIndex = -1; // Guarantee we are in Add mode
            
            // Reset titles and buttons to "Add" state
            document.getElementById('title-add-run').innerText = "Add Run Segment";
            document.getElementById('btn-submit-run').innerText = "Add";
            
            document.getElementById('title-add-station').innerText = "Add Station";
            document.getElementById('btn-submit-station').innerText = "Add";
            
            document.getElementById('title-add-rest').innerText = "Add Rest";
            document.getElementById('btn-submit-rest').innerText = "Add";

            document.getElementById(`form-add-${type}`).classList.remove('hidden');
            setTimeout(() => document.getElementById(`form-add-${type}`).scrollIntoView({behavior: "smooth"}), 100);
        }

        // Opens form pre-filled for an existing item
        function openEditForm(index) {
            closeAddForms();
            editIndex = index;
            const item = state.template[index];
            
            if (item.type === 'run') {
                // Parse "1km - Target: 05:00/km"
                let parts = item.detail.split(" - Target: ");
                document.getElementById('des-run-dist').value = parts[0] || "";
                if (parts[1]) document.getElementById('des-run-pace').value = parts[1];
                
                document.getElementById('title-add-run').innerText = "Edit Run Segment";
                document.getElementById('btn-submit-run').innerText = "Save";
                document.getElementById('form-add-run').classList.remove('hidden');
                setTimeout(() => document.getElementById('form-add-run').scrollIntoView({behavior: "smooth"}), 100);
                
            } else if (item.type === 'exercise') {
                const select = document.getElementById('des-station-name');
                const customInput = document.getElementById('des-station-custom');
                
                // Check if name is in standard dropdown
                let optionExists = Array.from(select.options).some(opt => opt.value === item.name);
                if (optionExists) {
                    select.value = item.name;
                    customInput.classList.add('hidden');
                } else {
                    select.value = "Custom";
                    customInput.value = item.name;
                    customInput.classList.remove('hidden');
                }
                
                document.getElementById('des-station-details').value = item.detail;
                
                document.getElementById('title-add-station').innerText = "Edit Station";
                document.getElementById('btn-submit-station').innerText = "Save";
                document.getElementById('form-add-station').classList.remove('hidden');
                setTimeout(() => document.getElementById('form-add-station').scrollIntoView({behavior: "smooth"}), 100);
                
            } else if (item.type === 'rest') {
                // Parse "Recovery: 90s"
                let parts = item.detail.split("Recovery: ");
                document.getElementById('des-rest-duration').value = parts[1] || "";
                
                document.getElementById('title-add-rest').innerText = "Edit Rest";
                document.getElementById('btn-submit-rest').innerText = "Save";
                document.getElementById('form-add-rest').classList.remove('hidden');
                setTimeout(() => document.getElementById('form-add-rest').scrollIntoView({behavior: "smooth"}), 100);
            }
        }

        function closeAddForms() {
            editIndex = -1; // Reset mode
            document.getElementById('form-add-run').classList.add('hidden');
            document.getElementById('form-add-station').classList.add('hidden');
            document.getElementById('form-add-rest').classList.add('hidden');
        }

        // Unified logic for handling Add vs Edit saves
        function addOrUpdateSegment(name, type, detail) {
            if (editIndex > -1) {
                // We are editing an existing item
                state.template[editIndex] = { name, type, detail };
                renderDesignerList();
                closeAddForms();
            } else {
                // We are adding a new item
                if (state.template.length > 0) {
                    const lastItemType = state.template[state.template.length - 1].type;
                    if (type !== 'rest' && type !== 'transition' && lastItemType !== 'transition' && lastItemType !== 'rest') {
                        state.template.push({ name: "Transition", type: "transition", detail: `Prepare for: ${name}` });
                    }
                }
                state.template.push({ name, type, detail });
                renderDesignerList();
                closeAddForms();
            }
        }

        function submitAddRun() {
            const dist = document.getElementById('des-run-dist').value || "1km";
            const pace = document.getElementById('des-run-pace').value; 
            addOrUpdateSegment("Run", "run", `${dist} - Target: ${pace}`);
        }

        function submitAddStation() {
            let name = document.getElementById('des-station-name').value;
            if (name === 'Custom') name = document.getElementById('des-station-custom').value || "Custom Station";
            const detail = document.getElementById('des-station-details').value || "Max Effort";
            addOrUpdateSegment(name, "exercise", detail);
        }

        function submitAddRest() {
            const duration = document.getElementById('des-rest-duration').value || "60s";
            addOrUpdateSegment("Rest", "rest", `Recovery: ${duration}`);
        }

        function startSessionFromDesigner() {
            if (state.template.length === 0) return;
            state.status = 'active';
            state.history = [];
            state.currentIndex = -1;
            state.segmentStartTime = null;
            
            showView('view-tracker');
            document.getElementById('active-segment-name').innerText = "Ready to start";
            document.getElementById('active-segment-detail').innerText = "Press start to begin first segment";
            document.getElementById('time-display').innerText = "00:00";
            document.getElementById('btn-next').innerText = "START SESSION";
            document.getElementById('tracker-progress').style.width = "0%";
            
            requestWakeLock();
            saveState();
        }

        // --- CORE DRIVE PUSH FUNCTION ---
        async function pushToDrive(payload, feedbackElementId) {
            const fb = document.getElementById(feedbackElementId);
            fb.innerText = "Saving to Google Drive...";
            fb.style.color = "var(--text-color)";
            fb.style.backgroundColor = "var(--border-color)";
            fb.classList.remove('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                fb.innerText = "Successfully saved to Drive!";
                fb.style.color = "#000";
                fb.style.backgroundColor = "var(--safe-color)";
                setTimeout(() => fb.classList.add('hidden'), 3000);

            } catch (error) {
                console.error('Transmission failed:', error);
                fb.innerText = "Network Error. Data copied to clipboard backup.";
                fb.style.color = "#000";
                fb.style.backgroundColor = "var(--accent-color)";
                
                const jsonStr = JSON.stringify(payload, null, 2);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(jsonStr);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = jsonStr;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    textArea.remove();
                }
            }
        }

        // --- MANUAL LOG LOGIC ---
        function setTodayDate() {
            document.getElementById('manual-date').value = new Date().toISOString().split('T')[0];
            if (manualExerciseCount === 0) addExerciseField();
        }

        function toggleManualFields() {
            const type = document.getElementById('manual-type').value;
            document.getElementById('manual-run-fields').classList.toggle('hidden', type !== 'run');
            document.getElementById('manual-gym-fields').classList.toggle('hidden', type !== 'gym');
        }

        function addExerciseField() {
            const container = document.getElementById('exercise-container');
            const i = manualExerciseCount;
            const html = `
                <div class="exercise-row" id="ex-row-${i}">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                        <label style="margin: 0;">Exercise ${i + 1}</label>
                        <button class="danger small" style="width: auto; padding: 4px 8px; margin: 0; background: transparent; border-color: transparent;" onclick="this.closest('.exercise-row').remove()">Remove ✕</button>
                    </div>
                    <input type="text" id="man-gym-name-${i}" placeholder="e.g. Back Squat">
                    <div class="grid-2">
                        <input type="text" id="man-gym-sets-${i}" placeholder="Sets">
                        <input type="text" id="man-gym-reps-${i}" placeholder="Reps">
                    </div>
                    <input type="text" id="man-gym-wt-${i}" placeholder="Weight (e.g. 100kg)">
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            manualExerciseCount++;
        }

        function generateManualJSON() {
            const type = document.getElementById('manual-type').value;
            const date = document.getElementById('manual-date').value;
            const notes = document.getElementById('manual-notes').value;
            let data = {};

            if (type === 'run') {
                data = { 
                    distance: document.getElementById('man-run-dist').value, 
                    time: document.getElementById('man-run-time').value 
                };
            } else if (type === 'gym') {
                let exercises = [];
                for(let i = 0; i < manualExerciseCount; i++) {
                    const nameEl = document.getElementById(`man-gym-name-${i}`);
                    if (nameEl && nameEl.value.trim() !== "") {
                        exercises.push({
                            name: nameEl.value,
                            sets: document.getElementById(`man-gym-sets-${i}`).value,
                            reps: document.getElementById(`man-gym-reps-${i}`).value,
                            weight: document.getElementById(`man-gym-wt-${i}`).value
                        });
                    }
                }
                data = { exercises: exercises };
            }

            const payload = { 
                meta: { type: "Manual Log", subtype: type, date: date }, 
                reflections: notes, 
                data: data 
            };
            
            pushToDrive(payload, 'manual-feedback');
        }

        // --- ROX TRACKER LOGIC ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.log('Wake Lock error:', err); }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function secToTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const diffSec = (now - state.segmentStartTime) / 1000;
                document.getElementById('time-display').innerText = secToTime(diffSec);
            }, 1000);
        }

        function nextSegment() {
            const now = new Date().getTime();
            
            // Record previous segment
            if (state.currentIndex >= 0 && state.currentIndex < state.template.length) {
                const duration = (now - state.segmentStartTime) / 1000;
                state.history.push({
                    segment: state.template[state.currentIndex],
                    duration: duration
                });
            }

            state.currentIndex++;

            // Update Progress Bar
            const progressPct = (state.currentIndex / state.template.length) * 100;
            document.getElementById('tracker-progress').style.width = `${progressPct}%`;

            // Check if finished
            if (state.currentIndex >= state.template.length) {
                endSession();
                return;
            }

            // Setup next segment
            state.segmentStartTime = now;
            updateTrackerUI();
            startTimer();
            saveState();
        }

        function updateTrackerUI() {
            const current = state.template[state.currentIndex];
            document.getElementById('active-segment-name').innerText = current.name;
            document.getElementById('active-segment-detail').innerText = current.detail;
            document.getElementById('btn-next').innerText = "NEXT: " + 
                (state.currentIndex + 1 < state.template.length ? state.template[state.currentIndex + 1].name : "FINISH");
            
            // Subtle styling shift based on segment type
            const btn = document.getElementById('btn-next');
            if(current.type === 'rest') {
                btn.style.backgroundColor = "var(--safe-color)";
                btn.style.color = "#000";
            } else {
                btn.style.backgroundColor = "var(--accent-color)";
                btn.style.color = "#000";
            }
        }

        function endSession() {
            clearInterval(timerInterval);
            releaseWakeLock();
            state.status = 'finished';
            saveState();
            renderSummary();
            showView('view-summary');
        }

        function renderSummary() {
            let html = "";
            let totalSec = 0;
            state.history.forEach(h => {
                html += `${secToTime(h.duration)} - ${h.segment.name}\n`;
                totalSec += h.duration;
            });
            html += `\nTOTAL TIME: ${secToTime(totalSec)}`;
            document.getElementById('summary-stats').innerText = html;
        }

        function exportData(format) {
            const notes = document.getElementById('notes-area').value;
            
            if (format === 'json') {
                const payload = {
                    meta: { 
                        type: "ROX Session", 
                        date: new Date().toISOString().split('T')[0]
                    },
                    reflections: notes,
                    segments: state.history.map(h => ({
                        segment: h.segment.name,
                        type: h.segment.type,
                        params: h.segment.detail,
                        duration_sec: Math.round(h.duration),
                        time: secToTime(h.duration)
                    }))
                };
                pushToDrive(payload, 'copy-feedback');
            } else {
                const date = new Date().toLocaleDateString('en-GB');
                const total = state.history.reduce((a,b)=>a+b.duration,0);
                const safeNotes = notes.replace(/,/g, ';').replace(/\n/g, ' ');
                const row = [date, secToTime(total), safeNotes];
                state.history.forEach(h => { 
                    row.push(h.segment.name); 
                    row.push(secToTime(h.duration)); 
                });
                
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(row.join(",")).then(() => {
                        const fb = document.getElementById('copy-feedback');
                        fb.innerText = "CSV Copied to Clipboard";
                        fb.style.backgroundColor = "var(--border-color)";
                        fb.classList.remove('hidden');
                        setTimeout(() => fb.classList.add('hidden'), 3000);
                    });
                }
            }
        }

        // --- UTILITY LOGIC ---
        function showView(id) {
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-designer').classList.add('hidden');
            document.getElementById('view-tracker').classList.add('hidden');
            document.getElementById('view-summary').classList.add('hidden');
            document.getElementById('view-manual').classList.add('hidden');
            
            document.getElementById(id).classList.remove('hidden');
            
            if(id === 'view-designer') {
                renderDesignerList();
            }
            
            window.scrollTo(0,0);
        }

        function saveState() { 
            if(isResetting) return;
            try { localStorage.setItem('rox_pro_state', JSON.stringify(state)); } catch(e){} 
        }

        function resetApp() {
            if(confirm("Return to main menu? Unsaved data will be cleared.")) {
                isResetting = true;
                clearInterval(timerInterval);
                releaseWakeLock();
                localStorage.removeItem('rox_pro_state');
                
                const currentTemplate = state.template;
                state = { status: 'idle', history: [], currentIndex: -1, segmentStartTime: null, template: currentTemplate };
                
                document.getElementById('manual-notes').value = "";
                document.getElementById('exercise-container').innerHTML = "";
                manualExerciseCount = 0;
                document.getElementById('notes-area').value = "";
                
                showView('view-menu');
                setTimeout(() => isResetting = false, 100);
            }
        }
        
        function checkForSavedWorkout() {
            const saved = localStorage.getItem('rox_pro_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.status === 'active') {
                        state = parsed;
                        state.segmentStartTime = new Date().getTime(); 
                        requestWakeLock();
                        startTimer();
                        updateTrackerUI();
                        showView('view-tracker');
                    } else if (parsed.status === 'finished') {
                        state = parsed;
                        renderSummary();
                        showView('view-summary');
                    }
                } catch (e) { localStorage.removeItem('rox_pro_state'); }
            }
        }
        
        checkForSavedWorkout();
    </script>
</body>
</html>
