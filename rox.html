<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>ROX TRACKER PRO</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #e0fa3e;
            --accent-hover: #c4dc2b;
            --danger-color: #ff453a;
            --safe-color: #30d158;
            --dim-text: #8e8e93;
            --border-color: #333;
            --blue-accent: #0a84ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .hidden { display: none !important; }

        h1, h2, h3, h4 { margin-top: 0; font-weight: 700; }
        
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background-color: var(--card-bg);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: opacity 0.2s, transform 0.1s;
            appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active { opacity: 0.7; transform: scale(0.98); }

        button.primary {
            background-color: var(--accent-color);
            color: #000;
            border: none;
        }

        button.danger {
            background-color: rgba(255, 69, 58, 0.1);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button.secondary {
            background-color: transparent;
            color: var(--blue-accent);
            border: 1px solid var(--blue-accent);
        }
        
        button.small {
            padding: 8px 12px;
            font-size: 14px;
            margin-bottom: 0;
            width: auto;
        }

        input, select, textarea {
            width: 100%;
            background-color: #000;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            box-sizing: border-box;
            appearance: none;
        }

        textarea { min-height: 100px; resize: vertical; }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--dim-text);
            font-size: 14px;
        }

        .menu-btn-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
        }
        .menu-btn-content svg { width: 48px; height: 48px; }
        .menu-btn-text { font-size: 18px; font-weight: 700; }
        .menu-btn-subtext { font-size: 13px; font-weight: 400; opacity: 0.7; }

        .designer-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .designer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #000;
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }
        .designer-item.type-run { border-left-color: var(--blue-accent); }
        .designer-item.type-rest { border-left-color: var(--safe-color); }
        .designer-item.type-transition { border-left-color: var(--dim-text); opacity: 0.6; padding: 6px 16px; margin-left: 20px; }
        .designer-item-info strong { display: block; font-size: 16px; margin-bottom: 2px;}
        .designer-item-info span { color: var(--dim-text); font-size: 13px; }

        .designer-actions { display: flex; gap: 6px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        .form-panel {
            background-color: #000;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .tracker-time {
            font-size: 64px;
            font-variant-numeric: tabular-nums;
            text-align: center;
            margin: 20px 0;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .tracker-segment { text-align: center; font-size: 24px; color: var(--accent-color); margin-bottom: 8px; }
        .tracker-detail { text-align: center; color: var(--dim-text); margin-bottom: 30px; }

        .feedback-toast {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .progress-bar {
            height: 4px;
            background-color: var(--border-color);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .review-row {
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .review-row:last-child { border: none; }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="view-menu">
        <h1 style="text-align: center; margin-bottom: 5px; font-size: 32px; letter-spacing: -1px;">ROX PRO</h1>
        <p style="text-align: center; color: var(--dim-text); margin-bottom: 30px;">Select training mode</p>
        
        <button class="primary" style="height: auto; padding: 24px;" onclick="showView('view-designer')">
            <div class="menu-btn-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 4h.01M4 20h4l1.5-3M8 20v-3l3-2 1 5h4M16 20h4l-2-7 3-1.5-2.5-4-3 1-2-3-2 1 1.5 3-2.5 1.5"></path>
                </svg>
                <div class="menu-btn-text">Workout Designer</div>
                <div class="menu-btn-subtext">Build & track dynamic ROX circuits</div>
            </div>
        </button>
        
        <button style="height: auto; padding: 24px;" onclick="showView('view-manual'); setTodayDate()">
            <div class="menu-btn-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <div class="menu-btn-text">Manual Log</div>
                <div class="menu-btn-subtext">Retrospectively log a session</div>
            </div>
        </button>

        <div style="text-align: center; margin-top: 40px;">
            <button class="secondary small" style="display: inline-flex; border: none; font-weight: normal; color: var(--dim-text);" onclick="testAPIConnection()">Test Google Drive Connection</button>
            <div id="test-feedback" class="feedback-toast hidden" style="margin-top: 10px; font-size: 13px;"></div>
        </div>
    </div>

    <!-- WORKOUT DESIGNER VIEW -->
    <div id="view-designer" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Designer</h2>
            <button class="small secondary" onclick="loadStandardRox()">Standard ROX</button>
        </div>

        <div class="card">
            <div id="designer-empty-state" style="text-align: center; color: var(--dim-text); padding: 20px 0;">
                No segments added.<br>Start building your timeline below.
            </div>
            
            <div id="designer-list" class="designer-list"></div>

            <div class="grid-3" style="margin-top: 20px;">
                <button class="small" onclick="openAddForm('run')">+ Run</button>
                <button class="small" onclick="openAddForm('station')">+ Station</button>
                <button class="small" onclick="openAddForm('rest')" style="color: var(--safe-color); border-color: var(--safe-color); background: transparent;">+ Rest</button>
            </div>
        </div>

        <div id="form-add-run" class="form-panel hidden">
            <h4 id="title-add-run">Add Run Segment</h4>
            <div class="grid-2">
                <div>
                    <label>Distance</label>
                    <input type="text" id="des-run-dist" placeholder="e.g. 1km">
                </div>
                <div>
                    <label>Pace / Target</label>
                    <select id="des-run-pace"></select>
                </div>
            </div>
            <div class="grid-2">
                <button class="primary small" id="btn-submit-run" onclick="submitAddRun()">Add</button>
                <button class="danger small" onclick="closeAddForms()">Cancel</button>
            </div>
        </div>

        <div id="form-add-station" class="form-panel hidden">
            <h4 id="title-add-station">Add Station</h4>
            <label>Station Type</label>
            <select id="des-station-name">
                <option value="Sled Push">Sled Push</option>
                <option value="Sled Pull">Sled Pull</option>
                <option value="Ski Erg">Ski Erg</option>
                <option value="Rowing">Rowing</option>
                <option value="Burpee Broad Jumps">Burpee Broad Jumps</option>
                <option value="Farmers Carry">Farmers Carry</option>
                <option value="Sandbag Lunges">Sandbag Lunges</option>
                <option value="Wall Balls">Wall Balls</option>
                <option value="Custom">-- Custom --</option>
            </select>
            <input type="text" id="des-station-custom" class="hidden" placeholder="Enter custom station name">
            <label>Details (Weight, Distance, Reps)</label>
            <input type="text" id="des-station-details" placeholder="e.g. 50m @ 155kg">
            <div class="grid-2">
                <button class="primary small" id="btn-submit-station" onclick="submitAddStation()">Add</button>
                <button class="danger small" onclick="closeAddForms()">Cancel</button>
            </div>
        </div>

        <div id="form-add-rest" class="form-panel hidden">
            <h4 id="title-add-rest">Add Rest</h4>
            <label>Duration</label>
            <input type="text" id="des-rest-duration" placeholder="e.g. 90s, 2 mins">
            <div class="grid-2">
                <button class="primary small" id="btn-submit-rest" onclick="submitAddRest()">Add</button>
                <button class="danger small" onclick="closeAddForms()">Cancel</button>
            </div>
        </div>

        <button class="primary" id="btn-start-designer" onclick="startSessionFromDesigner()" style="height: 60px; font-size: 18px;">Start Session</button>
        <button class="danger" onclick="showView('view-menu')">Back to Menu</button>
    </div>

    <!-- ROX TRACKER VIEW -->
    <div id="view-tracker" class="hidden">
        <div class="progress-bar"><div class="progress-fill" id="tracker-progress"></div></div>
        <div class="card">
            <div class="tracker-segment" id="active-segment-name">Ready</div>
            <div class="tracker-detail" id="active-segment-detail">Press start to begin</div>
            <div class="tracker-time" id="time-display">00:00</div>
            <button class="primary" id="btn-next" style="height: 80px; font-size: 20px;" onclick="nextSegment()">START</button>
            <button class="danger" onclick="endSession()">End Session</button>
        </div>
    </div>

    <!-- SUMMARY VIEW (EDITABLE REVIEW SCREEN) -->
    <div id="view-summary" class="hidden">
        <h2 style="margin-bottom: 4px;">Review Session</h2>
        <p style="color: var(--dim-text); font-size: 14px; margin-bottom: 20px;">Amend any errors before saving to Google Drive.</p>
        
        <div id="review-list" style="margin-bottom: 24px;">
            <!-- Injected editable rows -->
        </div>

        <div class="card">
            <label>Reflections (RPE, form, failures)</label>
            <textarea id="notes-area" placeholder="How did it feel?"></textarea>
        </div>

        <div id="copy-feedback" class="feedback-toast hidden"></div>
        
        <button class="primary" style="height: 64px; font-size: 18px;" onclick="prepareAndSyncToDrive()">Sync to Google Drive</button>
        
        <div class="grid-2">
            <button class="secondary small" onclick="exportToClipboardCSV()">Copy CSV Backup</button>
            <button class="danger small" onclick="resetApp()">Discard & Home</button>
        </div>
    </div>

    <!-- MANUAL LOG VIEW -->
    <div id="view-manual" class="hidden">
        <h2>Manual Entry</h2>
        <div class="card">
            <label>Session Type</label>
            <select id="manual-type" onchange="toggleManualFields()">
                <option value="gym">Gym / S&C</option>
                <option value="run">Run / Cardio</option>
                <option value="other">Other / Mixed</option>
            </select>
            <label>Date</label>
            <input type="date" id="manual-date">
            <label>Reflections</label>
            <textarea id="manual-notes" placeholder="Session details, RPE..."></textarea>
        </div>

        <div id="manual-run-fields" class="card hidden">
            <div class="grid-2">
                <div>
                    <label>Distance</label>
                    <input type="text" id="man-run-dist" placeholder="e.g. 5km">
                </div>
                <div>
                    <label>Time</label>
                    <input type="text" id="man-run-time" placeholder="e.g. 25:00">
                </div>
            </div>
        </div>

        <div id="manual-gym-fields" class="card">
            <h3 style="margin-bottom: 16px;">Exercises</h3>
            <div id="exercise-container"></div>
            <button class="secondary" onclick="addExerciseField()">+ Add Exercise</button>
        </div>

        <div id="manual-feedback" class="feedback-toast hidden"></div>
        <button class="primary" onclick="generateManualJSON()">Save to Google Drive</button>
        <button class="danger" onclick="showView('view-menu')">Cancel</button>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwv-xKc49ArTMrPE80dsdLTDE_csyGrnh1YhBiT0b5QgHpDYRlp0L5y34AN6idTHksO/exec'; 
        const API_SECRET = "birmingham-gas-cylinder-88";

        const standardRoxTemplate = [
            { name: "Run 1", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Ski Erg" },
            { name: "Ski Erg", type: "exercise", detail: "1000m" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 2", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Sled Push" },
            { name: "Sled Push", type: "exercise", detail: "50m @ 152kg" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 3", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Sled Pull" },
            { name: "Sled Pull", type: "exercise", detail: "50m @ 103kg" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 4", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Burpee Broad Jumps" },
            { name: "Burpee Broad Jumps", type: "exercise", detail: "80m" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 5", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Rowing" },
            { name: "Rowing", type: "exercise", detail: "1000m" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 6", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Farmers Carry" },
            { name: "Farmers Carry", type: "exercise", detail: "200m @ 24kg each" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 7", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Sandbag Lunges" },
            { name: "Sandbag Lunges", type: "exercise", detail: "100m @ 20kg" },
            { name: "Transition", type: "transition", detail: "Move to: Treadmill" },
            { name: "Run 8", type: "run", detail: "Target: 05:00/km" },
            { name: "Transition", type: "transition", detail: "Move to: Wall Balls" },
            { name: "Wall Balls", type: "exercise", detail: "100 reps @ 6kg" }
        ];

        let state = { 
            status: 'idle', 
            history: [], 
            currentIndex: -1, 
            segmentStartTime: null,
            template: [] 
        };
        
        let timerInterval, wakeLock = null, manualExerciseCount = 0, editIndex = -1, isResetting = false;

        function populatePaceDropdown() {
            const select = document.getElementById('des-run-pace');
            select.innerHTML = ''; 
            for (let m = 3; m <= 5; m++) {
                for (let s = 0; s < 60; s += 5) {
                    if (m === 5 && s > 30) continue; 
                    const sec = s.toString().padStart(2, '0');
                    const option = document.createElement('option');
                    option.value = `${m}:${sec}/km`;
                    option.text = `${m}:${sec}/km`;
                    if (m === 5 && s === 0) option.selected = true; 
                    select.appendChild(option);
                }
            }
        }
        populatePaceDropdown();

        // DESIGNER LOGIC
        document.getElementById('des-station-name').addEventListener('change', e => {
            document.getElementById('des-station-custom').classList.toggle('hidden', e.target.value !== 'Custom');
        });

        function loadStandardRox() {
            if(state.template.length > 0 && !confirm("Overwrite current design?")) return;
            state.template = JSON.parse(JSON.stringify(standardRoxTemplate));
            renderDesignerList();
        }

        function renderDesignerList() {
            const listEl = document.getElementById('designer-list'), emptyEl = document.getElementById('designer-empty-state'), startBtn = document.getElementById('btn-start-designer');
            listEl.innerHTML = '';
            if (state.template.length === 0) { emptyEl.classList.remove('hidden'); startBtn.classList.add('hidden'); return; }
            emptyEl.classList.add('hidden'); startBtn.classList.remove('hidden');

            state.template.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `designer-item type-${item.type}`;
                div.innerHTML = `
                    <div class="designer-item-info"><strong>${item.name}</strong><span>${item.detail}</span></div>
                    <div class="designer-actions">
                        ${item.type !== 'transition' ? `<button class="secondary small" onclick="openEditForm(${index})">✎</button>` : ''}
                        <button class="danger small" onclick="removeDesignerSegment(${index})">✕</button>
                    </div>`;
                listEl.appendChild(div);
            });
        }

        function removeDesignerSegment(index) { state.template.splice(index, 1); renderDesignerList(); }

        function openAddForm(type) {
            closeAddForms(); editIndex = -1;
            document.getElementById(`title-add-${type}`).innerText = `Add ${type.charAt(0).toUpperCase() + type.slice(1)}`;
            document.getElementById(`btn-submit-${type}`).innerText = "Add";
            document.getElementById(`form-add-${type}`).classList.remove('hidden');
        }

        function openEditForm(index) {
            closeAddForms(); editIndex = index;
            const item = state.template[index];
            if (item.type === 'run') {
                let parts = item.detail.split(" - Target: ");
                document.getElementById('des-run-dist').value = parts[0] || "";
                document.getElementById('des-run-pace').value = parts[1] || "5:00/km";
                document.getElementById('title-add-run').innerText = "Edit Run";
                document.getElementById('form-add-run').classList.remove('hidden');
            } else if (item.type === 'exercise') {
                document.getElementById('des-station-details').value = item.detail;
                document.getElementById('title-add-station').innerText = "Edit Station";
                document.getElementById('form-add-station').classList.remove('hidden');
            } else if (item.type === 'rest') {
                document.getElementById('des-rest-duration').value = item.detail.replace("Recovery: ", "");
                document.getElementById('title-add-rest').innerText = "Edit Rest";
                document.getElementById('form-add-rest').classList.remove('hidden');
            }
        }

        function closeAddForms() {
            ['run', 'station', 'rest'].forEach(t => document.getElementById(`form-add-${t}`).classList.add('hidden'));
        }

        function addOrUpdateSegment(name, type, detail) {
            if (editIndex > -1) {
                state.template[editIndex] = { name, type, detail };
            } else {
                if (state.template.length > 0) {
                    const lastType = state.template[state.template.length - 1].type;
                    if (type !== 'rest' && type !== 'transition' && lastType !== 'transition') {
                        state.template.push({ name: "Transition", type: "transition", detail: `Prep for ${name}` });
                    }
                }
                state.template.push({ name, type, detail });
            }
            renderDesignerList(); closeAddForms();
        }

        function submitAddRun() { addOrUpdateSegment("Run", "run", `${document.getElementById('des-run-dist').value || "1km"} - Target: ${document.getElementById('des-run-pace').value}`); }
        function submitAddStation() { 
            let n = document.getElementById('des-station-name').value;
            if (n === 'Custom') n = document.getElementById('des-station-custom').value || "Custom";
            addOrUpdateSegment(n, "exercise", document.getElementById('des-station-details').value || "Max Effort"); 
        }
        function submitAddRest() { addOrUpdateSegment("Rest", "rest", `Recovery: ${document.getElementById('des-rest-duration').value || "60s"}`); }

        // TRACKER LOGIC
        function startSessionFromDesigner() {
            if (!state.template.length) return;
            state.status = 'active'; state.history = []; state.currentIndex = -1;
            showView('view-tracker');
            document.getElementById('btn-next').innerText = "START SESSION";
            requestWakeLock(); saveState();
        }

        function secToTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
        
        // Parser to convert MM:SS or raw number back to seconds
        function timeToSec(str) {
            if (!str) return 0;
            if (str.includes(':')) {
                const parts = str.split(':');
                return (parseInt(parts[0]) * 60) + (parseInt(parts[1]) || 0);
            }
            return parseInt(str) || 0;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                document.getElementById('time-display').innerText = secToTime((new Date().getTime() - state.segmentStartTime) / 1000);
            }, 1000);
        }

        function nextSegment() {
            const now = new Date().getTime();
            if (state.currentIndex >= 0) {
                state.history.push({ segment: state.template[state.currentIndex], duration: (now - state.segmentStartTime) / 1000 });
            }
            state.currentIndex++;
            document.getElementById('tracker-progress').style.width = `${(state.currentIndex / state.template.length) * 100}%`;
            if (state.currentIndex >= state.template.length) { endSession(); return; }
            state.segmentStartTime = now;
            updateTrackerUI(); startTimer(); saveState();
        }

        function updateTrackerUI() {
            const c = state.template[state.currentIndex];
            document.getElementById('active-segment-name').innerText = c.name;
            document.getElementById('active-segment-detail').innerText = c.detail;
            document.getElementById('btn-next').innerText = "NEXT: " + (state.currentIndex + 1 < state.template.length ? state.template[state.currentIndex+1].name : "FINISH");
            document.getElementById('btn-next').style.backgroundColor = c.type === 'rest' ? "var(--safe-color)" : "var(--accent-color)";
        }

        function endSession() {
            clearInterval(timerInterval); releaseWakeLock();
            state.status = 'finished'; saveState();
            renderReviewInterface();
            showView('view-summary');
        }

        // REVIEW INTERFACE
        function renderReviewInterface() {
            const container = document.getElementById('review-list');
            container.innerHTML = "";
            state.history.forEach((h, i) => {
                const div = document.createElement('div');
                div.className = "review-row card";
                div.style.padding = "12px";
                div.innerHTML = `
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-bottom: 8px;">
                        <input type="text" id="rev-name-${i}" value="${h.segment.name}" style="margin:0; font-weight:bold;">
                        <input type="text" id="rev-time-${i}" value="${secToTime(h.duration)}" style="margin:0; font-variant-numeric: tabular-nums;">
                    </div>
                    <input type="text" id="rev-detail-${i}" value="${h.segment.detail}" style="margin:0; font-size:13px; color:var(--dim-text);">
                `;
                container.appendChild(div);
            });
        }

        async function prepareAndSyncToDrive() {
            const notes = document.getElementById('notes-area').value;
            const now = new Date();
            
            const editedHistory = state.history.map((h, i) => {
                const timeStr = document.getElementById(`rev-time-${i}`).value;
                const d = timeToSec(timeStr);
                return {
                    segment: document.getElementById(`rev-name-${i}`).value,
                    type: h.segment.type,
                    params: document.getElementById(`rev-detail-${i}`).value,
                    duration_sec: d,
                    duration_formatted: secToTime(d)
                };
            });

            const payload = {
                secret: API_SECRET,
                meta: { 
                    type: "ROX Session", 
                    date: now.toISOString().split('T')[0],
                    time_of_day: now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                },
                reflections: notes,
                segments: editedHistory
            };

            await pushToDrive(payload, 'copy-feedback');
        }

        function exportToClipboardCSV() {
            const rows = [["Date", "Time", "Segment", "Duration", "Detail"]];
            const date = new Date().toISOString().split('T')[0];
            state.history.forEach((h, i) => {
                const name = document.getElementById(`rev-name-${i}`).value;
                const dur = document.getElementById(`rev-time-${i}`).value; 
                const det = document.getElementById(`rev-detail-${i}`).value;
                rows.push([date, "N/A", name, dur, det]);
            });
            const csvContent = rows.map(e => e.join(",")).join("\n");
            navigator.clipboard.writeText(csvContent).then(() => {
                const fb = document.getElementById('copy-feedback');
                fb.innerText = "CSV Copied!"; fb.classList.remove('hidden');
                setTimeout(() => fb.classList.add('hidden'), 3000);
            });
        }

        // DRIVE PUSH
        async function pushToDrive(payload, feedbackId) {
            const fb = document.getElementById(feedbackId);
            fb.innerText = "Syncing to Google Drive..."; fb.classList.remove('hidden');
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                fb.innerText = "Saved to Google Drive!"; fb.style.backgroundColor = "var(--safe-color)";
                setTimeout(() => fb.classList.add('hidden'), 3000);
            } catch (e) {
                fb.innerText = "Error syncing. Copied backup."; fb.style.backgroundColor = "var(--danger-color)";
                navigator.clipboard.writeText(JSON.stringify(payload));
            }
        }

        async function testAPIConnection() {
            const fb = document.getElementById('test-feedback');
            fb.innerText = "Pinging Google Drive..."; fb.classList.remove('hidden');
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ secret: API_SECRET, isTest: true }), headers: { 'Content-Type': 'text/plain' } });
                const r = await res.json();
                fb.innerText = r.status === "success" ? "Google Drive Connected!" : "Auth Failed";
                fb.style.backgroundColor = r.status === "success" ? "var(--safe-color)" : "var(--danger-color)";
            } catch (e) { fb.innerText = "Endpoint Unreachable"; fb.style.backgroundColor = "var(--danger-color)"; }
            setTimeout(() => fb.classList.add('hidden'), 4000);
        }

        // MANUAL LOG
        function setTodayDate() { document.getElementById('manual-date').value = new Date().toISOString().split('T')[0]; if (!manualExerciseCount) addExerciseField(); }
        function toggleManualFields() { 
            const t = document.getElementById('manual-type').value;
            document.getElementById('manual-run-fields').classList.toggle('hidden', t !== 'run');
            document.getElementById('manual-gym-fields').classList.toggle('hidden', t !== 'gym');
        }
        function addExerciseField() {
            const i = manualExerciseCount++, c = document.getElementById('exercise-container');
            c.insertAdjacentHTML('beforeend', `<div class="exercise-row" id="ex-row-${i}"><label>Exercise ${i+1}</label><input type="text" id="man-gym-name-${i}"><div class="grid-2"><input type="text" id="man-gym-sets-${i}" placeholder="Sets"><input type="text" id="man-gym-reps-${i}" placeholder="Reps"></div><input type="text" id="man-gym-wt-${i}" placeholder="Weight"></div>`);
        }
        function generateManualJSON() {
            const t = document.getElementById('manual-type').value, now = new Date();
            let d = {};
            if (t === 'run') d = { distance: document.getElementById('man-run-dist').value, time: document.getElementById('man-run-time').value };
            else if (t === 'gym') {
                d.exercises = [];
                for(let i=0; i<manualExerciseCount; i++) {
                    const n = document.getElementById(`man-gym-name-${i}`);
                    if (n && n.value) d.exercises.push({ name: n.value, sets: document.getElementById(`man-gym-sets-${i}`).value, reps: document.getElementById(`man-gym-reps-${i}`).value, weight: document.getElementById(`man-gym-wt-${i}`).value });
                }
            }
            pushToDrive({ secret: API_SECRET, meta: { type: "Manual Log", subtype: t, date: document.getElementById('manual-date').value, time_of_day: now.toLocaleTimeString('en-GB') }, reflections: document.getElementById('manual-notes').value, data: d }, 'manual-feedback');
        }

        // UTILS
        function showView(v) { ['view-menu', 'view-designer', 'view-tracker', 'view-summary', 'view-manual'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(v).classList.remove('hidden'); if(v==='view-designer') renderDesignerList(); window.scrollTo(0,0); }
        async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
        function releaseWakeLock() { if(wakeLock) { wakeLock.release(); wakeLock = null; } }
        function saveState() { if(!isResetting) try { localStorage.setItem('rox_pro_state', JSON.stringify(state)); } catch(e){} }
        function resetApp() { if(confirm("Discard data and return home?")) { isResetting = true; clearInterval(timerInterval); releaseWakeLock(); localStorage.removeItem('rox_pro_state'); state = { status: 'idle', history: [], currentIndex: -1, segmentStartTime: null, template: state.template }; showView('view-menu'); setTimeout(()=>isResetting=false, 100); } }
        
        const s = localStorage.getItem('rox_pro_state');
        if (s) { try { const p = JSON.parse(s); if(p.status === 'active') { state = p; state.segmentStartTime = new Date().getTime(); requestWakeLock(); startTimer(); updateTrackerUI(); showView('view-tracker'); } else if(p.status==='finished') { state=p; renderReviewInterface(); showView('view-summary'); } } catch(e){} }
    </script>
</body>
</html>
